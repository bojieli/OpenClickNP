# SPDX-License-Identifier: Apache-2.0
# GitHub Actions config for OpenClickNP. Place at .github/workflows/ci.yml.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: L1 unit tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: install build deps
        run: sudo apt-get update && sudo apt-get install -y cmake g++ ninja-build
      - name: configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: build
        run: cmake --build build
      - name: ctest
        run: ctest --test-dir build --output-on-failure

  emulator:
    name: L2 software-emulator examples
    runs-on: ubuntu-22.04
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y cmake g++ ninja-build
      - run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release && cmake --build build
      - name: PassTraffic SW-emu
        run: ./scripts/sim/run_emu.sh examples/PassTraffic
      - name: Firewall SW-emu
        run: ./scripts/sim/run_emu.sh examples/Firewall || true   # phase-2 example

  verilator:
    name: L4 Verilator full-system sim
    runs-on: ubuntu-22.04
    needs: emulator
    if: false   # enable once Verilator >= 5.018 is on the runner image
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y cmake g++ ninja-build verilator
      - run: cmake -B build -G Ninja && cmake --build build
      - run: ./scripts/sim/run_verilator.sh examples/PassTraffic
