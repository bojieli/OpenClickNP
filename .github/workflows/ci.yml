# SPDX-License-Identifier: Apache-2.0
# GitHub Actions config for OpenClickNP.
#
# What this CI exercises (L1, L2 of the test pyramid):
#   • L1 unit tests for compiler frontend, runtime, and per-element behavior.
#   • L1 simulator smokes — SystemC + Verilator lint of the codegen output —
#     auto-enabled by ctest when the tools are installed below.
#   • L2 software-emulator end-to-end runs of representative examples.
#
# What this CI does NOT exercise: L3 (Vitis HLS cosim), L4 (full Verilator
# sim of the HLS RTL — needs HLS to have run first), and L5 (real Alveo U50)
# require AMD/Xilinx tooling and/or hardware. See docs/verification_levels.md.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-and-smokes:
    name: L1 unit + simulator smokes
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake g++ ninja-build \
            verilator libsystemc-dev
      - name: configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: build
        run: cmake --build build
      - name: ctest
        run: ctest --test-dir build --output-on-failure

  emulator:
    name: L2 software-emulator examples
    runs-on: ubuntu-22.04
    needs: unit-and-smokes
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y cmake g++ ninja-build
      - run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release && cmake --build build
      - name: PassTraffic SW-emu
        run: ./scripts/sim/run_emu.sh examples/PassTraffic
      - name: Firewall SW-emu
        run: ./scripts/sim/run_emu.sh examples/Firewall
